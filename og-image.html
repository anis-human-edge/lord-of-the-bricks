<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>Lord of the Bricks — OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0A1F44;
    color: #fff;
    position: relative;
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(900px 600px at 12% 18%, rgba(27,79,229,0.18), transparent 60%),
      radial-gradient(700px 500px at 90% 100%, rgba(200,16,46,0.16), transparent 55%),
      linear-gradient(135deg, #061434 0%, #0A1F44 60%, #0A1F44 100%);
  }
  .grain {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(135deg, transparent 0 22px, rgba(255,255,255,0.025) 22px 23px);
    pointer-events: none;
  }
  .accent-top { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #C8102E; z-index: 5; }

  .grid {
    position: relative;
    display: grid;
    grid-template-columns: 1.08fr 1fr;
    height: 100%;
    z-index: 2;
  }

  .text-side {
    padding: 70px 56px 70px 76px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .ribbon {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ffffff;
    padding: 11px 16px;
    background: #C8102E;
    align-self: flex-start;
    box-shadow: 0 8px 24px rgba(200,16,46,0.35);
  }
  .flag {
    width: 20px; height: 14px;
    background:
      linear-gradient(45deg, transparent 45%, #ffffff 45% 55%, transparent 55%),
      linear-gradient(-45deg, transparent 45%, #ffffff 45% 55%, transparent 55%),
      linear-gradient(0deg, transparent 41%, #ffffff 41% 59%, transparent 59%),
      linear-gradient(90deg, transparent 41%, #ffffff 41% 59%, transparent 59%),
      #0A1F44;
    border: 1px solid rgba(255,255,255,0.4);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Space Grotesk', 'Inter Tight', system-ui, sans-serif;
    font-weight: 700;
    font-size: 96px;
    line-height: 0.92;
    letter-spacing: -0.038em;
    margin: 30px 0 22px;
  }
  h1 .accent { color: #C8102E; }

  .lede {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.28;
    color: rgba(255,255,255,0.94);
    max-width: 560px;
  }
  .lede .em { color: #C8102E; font-weight: 600; }

  .footer {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 28px;
  }
  .logo {
    width: 56px; height: 56px;
    background: #C8102E;
    border-radius: 11px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    place-items: center;
    padding: 10px;
    gap: 4px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .stud { width: 11px; height: 11px; border-radius: 50%; background: #0A1F44; }
  .footer .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.78);
    line-height: 1.45;
  }
  .footer .meta strong { color: #fff; font-weight: 700; }

  .photo-side {
    position: relative;
    overflow: hidden;
  }
  .photo-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 28%;
  }
  .photo-side::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #0A1F44 0%, rgba(10,31,68,0.45) 18%, transparent 35%);
    z-index: 1;
  }
  .photo-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(6,20,52,0.55) 100%);
    z-index: 1;
  }

  .stamp {
    position: absolute;
    bottom: 56px; right: -32px;
    background: #fff;
    color: #0A1F44;
    padding: 14px 56px 14px 32px;
    transform: rotate(-2.4deg);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 3;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 2px 0 #C8102E;
  }
  .stamp::before {
    content: '';
    position: absolute;
    left: -1px; top: 0; bottom: 0; width: 4px;
    background: #C8102E;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grain"></div>
  <div class="accent-top"></div>

  <div class="grid">
    <div class="text-side">
      <div>
        <div class="ribbon">
          <span class="flag"></span>
          UK National Knockout Champions 2026
        </div>
        <h1>Lord of the<br><span class="accent">Bricks.</span></h1>
        <p class="lede">Nine kids. One robot. <span class="em">One AI live in production.</span></p>
      </div>
      <div class="footer">
        <div class="logo">
          <span class="stud"></span><span class="stud"></span>
          <span class="stud"></span><span class="stud"></span>
        </div>
        <div class="meta">
          <strong>FLL Korea Open</strong><br>Jeonju &middot; 3&ndash;5 July 2026
        </div>
      </div>
    </div>

    <div class="photo-side">
      <img src="https://jqpwucwzacqrpeazqbmd.supabase.co/storage/v1/object/public/public-assets/LOFB/Images/LOFB-Team.jpg" alt="">
      <div class="stamp">Worlds 2026</div>
    </div>
  </div>
</body>
</html>
